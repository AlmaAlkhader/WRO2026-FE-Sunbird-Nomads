<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16835f"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="50" y="52" font-size="28" font-weight="700" fill="#172033">Power and Control Distribution</text>
  <text x="50" y="82" font-size="15" fill="#64748b">Two power sources isolate the Raspberry Pi from motor-current disturbances while sharing a common ground.</text>

  <rect x="40" y="115" width="1120" height="245" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <rect x="40" y="390" width="1120" height="245" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>

  <text x="70" y="150" font-size="16" font-weight="700" fill="#9a3412">DRIVE AND STEERING POWER</text>
  <text x="70" y="177" font-size="13" fill="#9a3412">3S pack: 11.1 V nominal · 12.6 V fully charged · 2.25 Ah</text>

  <rect x="70" y="215" width="190" height="82" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="165" y="247" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">3 × 18500 cells</text>
  <text x="165" y="272" text-anchor="middle" font-size="13" fill="#7c2d12">motor battery pack</text>

  <rect x="330" y="215" width="150" height="82" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="405" y="247" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">Power switch</text>
  <text x="405" y="272" text-anchor="middle" font-size="13" fill="#7c2d12">drive isolation</text>

  <rect x="550" y="205" width="190" height="102" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="645" y="240" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">L298N</text>
  <text x="645" y="265" text-anchor="middle" font-size="13" fill="#7c2d12">motor controller</text>
  <text x="645" y="286" text-anchor="middle" font-size="12" fill="#9a3412">PWM + direction</text>

  <rect x="830" y="180" width="260" height="72" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="960" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">25 mm metal gearmotor</text>
  <text x="960" y="233" text-anchor="middle" font-size="13" fill="#7c2d12">rear-wheel drive</text>

  <rect x="830" y="275" width="260" height="72" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="960" y="305" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">S3003 steering servo</text>
  <text x="960" y="328" text-anchor="middle" font-size="13" fill="#7c2d12">5 V terminal + GPIO12 signal</text>

  <line x1="260" y1="256" x2="325" y2="256" stroke="#d97706" stroke-width="4" marker-end="url(#arrow-orange)"/>
  <line x1="480" y1="256" x2="545" y2="256" stroke="#d97706" stroke-width="4" marker-end="url(#arrow-orange)"/>
  <path d="M740 240 H785 V216 H825" fill="none" stroke="#d97706" stroke-width="4" marker-end="url(#arrow-orange)"/>
  <path d="M740 270 H785 V311 H825" fill="none" stroke="#d97706" stroke-width="4" marker-end="url(#arrow-orange)"/>

  <text x="70" y="425" font-size="16" font-weight="700" fill="#1d4ed8">COMPUTING AND SENSOR POWER</text>
  <text x="70" y="452" font-size="13" fill="#1d4ed8">Billboard power bank: labelled 5 V / 3 A output</text>

  <rect x="70" y="495" width="210" height="82" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="527" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">10,000 mAh</text>
  <text x="175" y="552" text-anchor="middle" font-size="13" fill="#1e3a8a">USB power bank</text>

  <rect x="370" y="485" width="190" height="102" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="465" y="522" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">Raspberry Pi 4</text>
  <text x="465" y="548" text-anchor="middle" font-size="13" fill="#1e3a8a">processing + GPIO</text>
  <text x="465" y="569" text-anchor="middle" font-size="12" fill="#1d4ed8">common controller</text>

  <rect x="690" y="465" width="195" height="62" rx="11" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="787" y="502" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">IMX708 camera</text>

  <rect x="925" y="465" width="195" height="62" rx="11" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="1022" y="492" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Left + right</text>
  <text x="1022" y="512" text-anchor="middle" font-size="13" fill="#1e3a8a">ultrasonic sensors</text>

  <rect x="805" y="555" width="195" height="62" rx="11" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="902" y="582" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Rear VL53L0X</text>
  <text x="902" y="602" text-anchor="middle" font-size="13" fill="#1e3a8a">parking sensor</text>

  <line x1="280" y1="536" x2="365" y2="536" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <path d="M560 515 H630 V496 H685" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <path d="M560 536 H900 V496 H920" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <path d="M560 557 H750 V586 H800" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>

  <path d="M465 485 V385 H645 V312" fill="none" stroke="#16835f" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrow-green)"/>
  <path d="M500 485 V375 H1125 V311 H1095" fill="none" stroke="#16835f" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrow-green)"/>
  <rect x="665" y="363" width="170" height="24" rx="8" fill="#ffffff" fill-opacity="0.94"/>
  <text x="750" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#16835f">GPIO control signals</text>

  <line x1="120" y1="670" x2="1080" y2="670" stroke="#6b7280" stroke-width="3" stroke-dasharray="5 6"/>
  <text x="600" y="701" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Shared common ground connects both electrical domains</text>
</svg>
