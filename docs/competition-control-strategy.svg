<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
<defs>
  <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#12243c"/></marker>
  <style>
    .t{font-size:23px;font-weight:700;fill:#12243c}.s{font-size:12px;fill:#5b6472}
    .h{font-size:14px;font-weight:700;fill:#12243c}.b{font-size:11px;fill:#46505e}
    .w{font-size:11px;fill:#fff}.f{fill:none;stroke:#12243c;stroke-width:2;marker-end:url(#a)}
    .d{fill:none;stroke:#dfa527;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#a)}
  </style>
</defs>
<rect width="1000" height="720" fill="#fff"/>
<text x="500" y="37" text-anchor="middle" class="t">Competition Control Strategy</text>
<text x="500" y="59" text-anchor="middle" class="s">One start sequence selects the challenge, then shares the same safety, wall sensing, corner counting, and actuator layers.</text>

<rect x="55" y="95" width="150" height="60" rx="12" fill="#e8edf3"/>
<text x="130" y="120" text-anchor="middle" class="h">Power control</text>
<text x="130" y="140" text-anchor="middle" class="b">Energize robot</text>
<rect x="250" y="95" width="150" height="60" rx="12" fill="#f7ecd2"/>
<text x="325" y="120" text-anchor="middle" class="h">Run control</text>
<text x="325" y="140" text-anchor="middle" class="b">Start one autonomous run</text>
<rect x="445" y="95" width="200" height="60" rx="12" fill="#e8edf3"/>
<text x="545" y="119" text-anchor="middle" class="h">Read rear ToF</text>
<text x="545" y="140" text-anchor="middle" class="b">Classify once at startup</text>
<path d="M205 125H240" class="f"/><path d="M400 125H435" class="f"/>

<polygon points="750,85 880,125 750,165 620,125" fill="#12243c"/>
<text x="750" y="121" text-anchor="middle" class="w">Drear &lt; 150 mm?</text>
<text x="750" y="138" text-anchor="middle" class="w">valid reading required</text>
<path d="M645 125H610" class="f"/>

<rect x="80" y="225" width="370" height="350" rx="18" fill="#e8edf3"/>
<text x="265" y="257" text-anchor="middle" class="h">Task 1 · Open Challenge</text>
<rect x="110" y="282" width="310" height="58" rx="10" fill="#fff"/>
<text x="265" y="304" text-anchor="middle" class="b">Sequential left/right ultrasonic readings</text>
<text x="265" y="322" text-anchor="middle" class="b">60 ms spacing · median of 3 valid samples</text>
<rect x="110" y="365" width="310" height="72" rx="10" fill="#fff"/>
<text x="265" y="388" text-anchor="middle" class="b">Close-wall correction has priority</text>
<text x="265" y="406" text-anchor="middle" class="b">Otherwise confirm corner direction 3 times</text>
<text x="265" y="424" text-anchor="middle" class="b">Stop → steer → timed drive → recenter</text>
<rect x="110" y="462" width="310" height="78" rx="10" fill="#12243c"/>
<text x="265" y="487" text-anchor="middle" class="w">Count one completed corner maneuver</text>
<text x="265" y="507" text-anchor="middle" class="w">4 corners = 1 lap</text>
<text x="265" y="527" text-anchor="middle" class="w">Stop after corner 12 = 3 laps</text>

<rect x="550" y="225" width="370" height="350" rx="18" fill="#f7ecd2"/>
<text x="735" y="257" text-anchor="middle" class="h">Task 2 · Obstacle Challenge</text>
<rect x="580" y="282" width="310" height="78" rx="10" fill="#fff"/>
<text x="735" y="304" text-anchor="middle" class="b">Picamera2 frame → HSV masks → contours</text>
<text x="735" y="322" text-anchor="middle" class="b">Reject area ≤ 800 px²</text>
<text x="735" y="340" text-anchor="middle" class="b">Choose the largest red/green contour</text>
<rect x="580" y="380" width="310" height="80" rx="10" fill="#fff"/>
<text x="735" y="402" text-anchor="middle" class="b">RED: pass right, angle moves toward 81°</text>
<text x="735" y="421" text-anchor="middle" class="b">GREEN: pass left, angle moves toward 131°</text>
<text x="735" y="440" text-anchor="middle" class="b">Center = 106° · 3-frame disappearance exit</text>
<rect x="580" y="480" width="310" height="60" rx="10" fill="#12243c"/>
<text x="735" y="504" text-anchor="middle" class="w">Obstacle → wall correction → corner logic</text>
<text x="735" y="525" text-anchor="middle" class="w">Same 12-corner / 3-lap stop rule</text>

<path d="M750 165V193H265V215" class="f"/>
<text x="465" y="188" text-anchor="middle" class="s">No · Task 1</text>
<path d="M750 165V215" class="f"/>
<text x="794" y="192" class="s">Yes · Task 2</text>

<rect x="190" y="625" width="620" height="54" rx="12" fill="#12243c"/>
<text x="500" y="648" text-anchor="middle" class="w">Global priority: emergency stop → pillar avoidance → close-wall correction → corner detection → forward drive</text>
<text x="500" y="667" text-anchor="middle" class="w">Heartbeat loss, invalid task reading, or ambiguous forced turn produces a safe stop</text>
<path d="M265 575V615" class="d"/><path d="M735 575V615" class="d"/>
<text x="500" y="705" text-anchor="middle" class="s">Control specification. Parameters exposed in the dashboard remain adjustable during calibration.</text>
</svg>