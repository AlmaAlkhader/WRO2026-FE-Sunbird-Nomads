<svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<style>.t{font-size:22px;font-weight:700;fill:#12243c}.s{font-size:11px;fill:#5b6472}.h{font-size:13px;font-weight:700;fill:#12243c}.n{font-size:13px;font-weight:700;fill:#fff}</style>
<rect width="1000" height="470" fill="#fff"/><text x="500" y="35" text-anchor="middle" class="t">Corner Counter and Three-Lap Stop Rule</text>
<text x="500" y="56" text-anchor="middle" class="s">The counter advances once per completed corner maneuver—not once per sensor threshold crossing.</text>
<g transform="translate(70 105)"><rect width="260" height="250" rx="18" fill="#e8edf3"/><text x="130" y="31" text-anchor="middle" class="h">Lap 1 · corners 1–4</text>
<path d="M65 75H195V205H65Z" fill="none" stroke="#12243c" stroke-width="7"/><circle cx="65" cy="75" r="18" fill="#dfa527"/><circle cx="195" cy="75" r="18" fill="#dfa527"/><circle cx="195" cy="205" r="18" fill="#dfa527"/><circle cx="65" cy="205" r="18" fill="#dfa527"/>
<text x="65" y="80" text-anchor="middle" class="n">1</text><text x="195" y="80" text-anchor="middle" class="n">2</text><text x="195" y="210" text-anchor="middle" class="n">3</text><text x="65" y="210" text-anchor="middle" class="n">4</text></g>
<g transform="translate(370 105)"><rect width="260" height="250" rx="18" fill="#f7ecd2"/><text x="130" y="31" text-anchor="middle" class="h">Lap 2 · corners 5–8</text>
<path d="M65 75H195V205H65Z" fill="none" stroke="#12243c" stroke-width="7"/><circle cx="65" cy="75" r="18" fill="#dfa527"/><circle cx="195" cy="75" r="18" fill="#dfa527"/><circle cx="195" cy="205" r="18" fill="#dfa527"/><circle cx="65" cy="205" r="18" fill="#dfa527"/>
<text x="65" y="80" text-anchor="middle" class="n">5</text><text x="195" y="80" text-anchor="middle" class="n">6</text><text x="195" y="210" text-anchor="middle" class="n">7</text><text x="65" y="210" text-anchor="middle" class="n">8</text></g>
<g transform="translate(670 105)"><rect width="260" height="250" rx="18" fill="#e8edf3"/><text x="130" y="31" text-anchor="middle" class="h">Lap 3 · corners 9–12</text>
<path d="M65 75H195V205H65Z" fill="none" stroke="#12243c" stroke-width="7"/><circle cx="65" cy="75" r="18" fill="#dfa527"/><circle cx="195" cy="75" r="18" fill="#dfa527"/><circle cx="195" cy="205" r="18" fill="#dfa527"/><circle cx="65" cy="205" r="18" fill="#dfa527"/>
<text x="65" y="80" text-anchor="middle" class="n">9</text><text x="195" y="80" text-anchor="middle" class="n">10</text><text x="195" y="210" text-anchor="middle" class="n">11</text><text x="65" y="210" text-anchor="middle" class="n">12</text></g>
<rect x="250" y="395" width="500" height="48" rx="12" fill="#12243c"/><text x="500" y="416" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">corner_count = 12 → motor stop → steering center</text><text x="500" y="433" text-anchor="middle" font-size="10.5" fill="#dfa527">4 corners per lap × 3 laps = 12 completed corners</text></svg>