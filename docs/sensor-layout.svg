<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="front-arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#172033"/>
    </marker>
    <linearGradient id="camera-cone" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="left-cone" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="right-cone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="tof-cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f9f75" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0f9f75" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
