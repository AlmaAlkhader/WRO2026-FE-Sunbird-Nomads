  <path d="M805 330 L1115 245 L1115 475 L805 390 Z" fill="url(#right-cone)" stroke="#d97706" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M565 610 L500 730 L700 730 L635 610 Z" fill="url(#tof-cone)" stroke="#0f9f75" stroke-width="1.5" stroke-dasharray="7 6"/>

