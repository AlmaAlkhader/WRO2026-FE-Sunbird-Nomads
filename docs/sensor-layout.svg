  <text x="50" y="80" font-size="14" fill="#64748b">Conceptual top view · component positions show function and direction, not measured coordinates</text>

  <line x1="600" y1="128" x2="600" y2="96" stroke="#172033" stroke-width="4" marker-end="url(#front-arrow)"/>
  <text x="600" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">FRONT</text>

