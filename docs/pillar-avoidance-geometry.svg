<rect width="1000" height="570" fill="#fff"/><text x="500" y="35" text-anchor="middle" class="t">Pillar Avoidance Geometry</text>
<text x="500" y="57" text-anchor="middle" class="s">Top-down conceptual paths; the calibrated controller uses gradual steering rather than an instantaneous lane change.</text>
