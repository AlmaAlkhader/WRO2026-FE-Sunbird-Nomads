<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Mechanical design iteration loop</title>
  <desc id="desc">The team's repeated workflow of measuring, creating CAD, printing, testing the fit and refining the design across four plate versions.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9z" fill="#dfa527"/>
    </marker>
  </defs>
  <style>
    .flow { stroke-dasharray:7 9; animation:flow 2.5s linear infinite; }
    .node { filter:drop-shadow(0 3px 4px rgba(18,36,60,.12)); }
    .test { animation:pulse 2s ease-in-out infinite; transform-origin:center; }
    @keyframes flow { to { stroke-dashoffset:-32; } }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <rect width="1200" height="420" rx="20" fill="#fff"/>
  <text x="600" y="44" text-anchor="middle" font-size="25" font-weight="700" fill="#12243c">From Measurements to a Reliable Fit</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#667085">A physical print exposed errors that were difficult to see in CAD, so the loop was repeated across four plate versions</text>

  <path d="M180 210H355M440 210H615M700 210H875M960 210H1065" fill="none" stroke="#dfa527" stroke-width="4" marker-end="url(#arrow)" class="flow"/>
  <path d="M1070 245C1060 345 190 350 135 255" fill="none" stroke="#2d70a5" stroke-width="3" marker-end="url(#arrow)" class="flow"/>

  <g class="node">
    <circle cx="135" cy="210" r="61" fill="#eaf3fb" stroke="#2d70a5" stroke-width="3"/>
    <path d="M104 204h62M111 191v26M125 191v18M139 191v26M153 191v18" stroke="#2d70a5" stroke-width="3" stroke-linecap="round"/>
    <text x="135" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#12243c">1 · Measure</text>
    <text x="135" y="313" text-anchor="middle" font-size="11" fill="#667085">components and chassis</text>
  </g>

  <g class="node">
    <circle cx="395" cy="210" r="61" fill="#f7ecd2" stroke="#dfa527" stroke-width="3"/>
    <path d="M366 230l16-42 19 27 14-20 15 35z" fill="none" stroke="#dfa527" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="382" cy="188" r="4" fill="#dfa527"/>
    <text x="395" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#12243c">2 · Model</text>
    <text x="395" y="313" text-anchor="middle" font-size="11" fill="#667085">plate and mount CAD</text>
  </g>

  <g class="node">
    <circle cx="655" cy="210" r="61" fill="#eef5ee" stroke="#65a56d" stroke-width="3"/>
    <path d="M625 190h60v46h-60zM635 178h40v12M637 202h36M637 214h36M637 226h24" fill="none" stroke="#65a56d" stroke-width="3" stroke-linejoin="round"/>
    <text x="655" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#12243c">3 · Print</text>
    <text x="655" y="313" text-anchor="middle" font-size="11" fill="#667085">Rapid PETG plate</text>
  </g>

  <g class="node test">
    <circle cx="915" cy="210" r="61" fill="#f4eff8" stroke="#81659a" stroke-width="3"/>
    <path d="M883 213l18 18 42-47" fill="none" stroke="#81659a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="915" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#12243c">4 · Fit-test</text>
    <text x="915" y="313" text-anchor="middle" font-size="11" fill="#667085">clearance and access</text>
  </g>

  <g class="node">
    <circle cx="1090" cy="210" r="61" fill="#fff1eb" stroke="#d86f45" stroke-width="3"/>
    <path d="M1059 210h62M1090 179v62M1070 190l40 40M1110 190l-40 40" stroke="#d86f45" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1090" cy="210" r="12" fill="#fff1eb" stroke="#d86f45" stroke-width="3"/>
    <text x="1090" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#12243c">5 · Refine</text>
    <text x="1090" y="313" text-anchor="middle" font-size="11" fill="#667085">correct and repeat</text>
  </g>

  <rect x="320" y="350" width="560" height="42" rx="12" fill="#f5f7fa"/>
  <text x="600" y="376" text-anchor="middle" font-size="13" font-style="italic" fill="#12243c">The failed fits were useful measurements—not wasted prints.</text>
</svg>
